services:

  db:
    image: postgres:16
    container_name: postgres-db
    restart: always

    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: student123
      POSTGRES_DB: studentdb

    volumes:
      - postgres-data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  flask:
    build: .
    container_name: student-app
    restart: always

    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: student123
      POSTGRES_DB: studentdb
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: mysecretkey

    depends_on:
      - db

    ports:
      - "5020:5020"

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - flask

volumes:
  postgres-data: