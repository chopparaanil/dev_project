<!DOCTYPE html>
<html>
<head>

<title>Students</title>

</head>

<body>

<h1>Student Management digit domain  System v2</h1>

<a href="/add">Add Student</a>

<hr>

<table border="1">

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Course</th>

<th>Action</th>

</tr>

{% for student in students %}

<tr>

<td>{{student.id}}</td>

<td>{{student.name}}</td>

<td>{{student.email}}</td>

<td>{{student.course}}</td>

<td>

<a href="/edit/{{student.id}}">Edit</a>

<a href="/delete/{{student.id}}">Delete</a>

</td>

</tr>

{% endfor %}

</table>

</body>

</html>
